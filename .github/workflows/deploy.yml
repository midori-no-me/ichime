name: Deploy to TestFlight

on:
  pull_request:
  # push:
  # tags:
  #   - '[0-9]+.[0-9]+.[0-9]+*'  # Триггер на теги типа 1.10.0, 1.10.1, etc.
  workflow_dispatch: # Ручной запуск для тестирования
    inputs:
      version:
        description: "Version to deploy (e.g., 1.10.0)"
        required: true
        default: "1.10.0"
      test_mode:
        description: "Test mode (skip TestFlight upload)"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Version Variables
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$((${{ github.run_number }} + 101000))" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"
          echo "Build number: $((${{ github.run_number }} + 101000))"

      - name: Install Dependencies
        run: |
          brew install xcodegen
          brew install fastlane

      - name: Setup Keychain
        run: |
          security create-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

      - name: Import Certificates
        run: |
          echo "${{ secrets.CERTIFICATES_P12 }}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.CERTIFICATES_PASSWORD }}" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12
          
          # Проверяем что сертификат импортировался
          echo "=== Imported certificates ==="
          security find-identity -v -p codesigning build.keychain

      - name: Install Provisioning Profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_ICHIME }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Ichime\ Distribution.mobileprovision
          echo "${{ secrets.PROVISIONING_PROFILE_TOPSHELF }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Ichime\ TopShelf\ Distribution.mobileprovision

      - name: Verify Provisioning Profiles
        run: |
          echo "=== Checking provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "=== Ichime profile info ==="
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/Ichime\ Distribution.mobileprovision | head -20
          echo "=== TopShelf profile info ==="
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/Ichime\ TopShelf\ Distribution.mobileprovision | head -20

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Install Bundle Dependencies
        run: bundle install

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and Upload to TestFlight
        if: ${{ !github.event.inputs.test_mode }}
        env:
          VERSION: ${{ env.VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          cd fastlane
          bundle install
          bundle exec fastlane tvos deploy version:$VERSION build_number:$BUILD_NUMBER

      - name: Test Build Only
        if: ${{ github.event.inputs.test_mode }}
        env:
          VERSION: ${{ env.VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          cd fastlane
          bundle install
          bundle exec fastlane tvos test_build version:$VERSION build_number:$BUILD_NUMBER

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ichime-build-${{ env.VERSION }}
          path: |
            build/Ichime.ipa
            build/Ichime.xcarchive
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/Ichime\ Distribution.mobileprovision || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/Ichime\ TopShelf\ Distribution.mobileprovision || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 || true

      - name: Create GitHub Release
        if: github.event_name == 'push' && !github.event.inputs.test_mode
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          body: |
            ## Изменения в версии ${{ env.VERSION }}

            Сборка автоматически загружена в TestFlight.

            **Build Number:** ${{ env.BUILD_NUMBER }}
            **Дата сборки:** ${{ github.run_id }}
          draft: false
          prerelease: false
