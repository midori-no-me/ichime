name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  APP_VERSION: ${{ github.event.release.tag_name }}
  APPDB_API_BASE_URL: https://api.dbservices.to/v1.7
  APPDB_MIN_TVOS_VERSION: "26.0"
  TUIST_APP_VERSION: ${{ github.event.release.tag_name }}
  TUIST_BUILD_NUMBER: ${{ github.run_number }}

jobs:
  tuist:
    name: Tuist
    runs-on: macos-26

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Tuist
        run: brew install tuist

      - name: Install Dependencies
        run: tuist install

      - name: Generate Xcode Configs
        run: tuist generate --no-open

      - name: Upload Repository w/ Xcode Configs Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ichime-tuist
          path: ./
          retention-days: 7
          include-hidden-files: true

  build_ipa:
    name: Build IPA
    runs-on: macos-26
    needs: [tuist]

    steps:
      - name: Download Repository w/ Xcode Configs Artifact
        uses: actions/download-artifact@v8
        with:
          name: ichime-tuist
          path: ./

      - name: Build Unsigned App
        uses: ./.github/actions/build-unsigned-app
        with:
          derived-data-path: Derived/appdb/DerivedData

      - name: Create IPA Payload Directory
        run: mkdir -p Derived/appdb/staging/Payload

      - name: Copy App Into IPA Payload
        run: ditto Derived/appdb/DerivedData/Build/Products/Release-appletvos/Ichime.app Derived/appdb/staging/Payload/Ichime.app

      - name: Copy appdb Icon
        run: ditto .github/assets/appdb_icon.png Derived/appdb/staging/Payload/Ichime.app/AppIcon.png

      - name: Remove Generated Primary Icon Metadata
        run: /usr/libexec/PlistBuddy -c 'Delete :CFBundleIcons:CFBundlePrimaryIcon' Derived/appdb/staging/Payload/Ichime.app/Info.plist || true

      - name: Create Icon Metadata Container
        run: /usr/libexec/PlistBuddy -c 'Add :CFBundleIcons dict' Derived/appdb/staging/Payload/Ichime.app/Info.plist || true

      - name: Add Primary Icon Metadata
        run: /usr/libexec/PlistBuddy -c 'Add :CFBundleIcons:CFBundlePrimaryIcon dict' -c 'Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array' -c 'Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon' Derived/appdb/staging/Payload/Ichime.app/Info.plist

      - name: Remove Generated Icon File Metadata
        run: /usr/libexec/PlistBuddy -c 'Delete :CFBundleIconFile' Derived/appdb/staging/Payload/Ichime.app/Info.plist || true

      - name: Add Icon File Metadata
        run: /usr/libexec/PlistBuddy -c 'Add :CFBundleIconFile string AppIcon' Derived/appdb/staging/Payload/Ichime.app/Info.plist

      - name: Package Unsigned IPA
        run: cd Derived/appdb/staging && zip -qry ../../Ichime.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ichime-ipa
          path: Derived/Ichime.ipa
          if-no-files-found: error
          retention-days: 7

  publish_appdb:
    name: Publish IPA to appdb
    runs-on: macos-26
    needs: [build_ipa]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Download IPA Artifact
        uses: actions/download-artifact@v8
        with:
          name: ichime-ipa
          path: ./

      - name: Create appdb Job ID
        id: appdb_job
        run: >
          ipa_sha1="$(shasum Ichime.ipa | awk '{print $1}')";
          echo "id=$(printf '%s' '${{ github.repository }}:Ichime.ipa:${{ github.run_id }}:${{ github.run_attempt }}:'"$ipa_sha1" | shasum | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload IPA to appdb
        env:
          APPDB_ST: ${{ secrets.APPDB_ST }}
          APPDB_APP_IDENTIFIER: ${{ vars.APPDB_APP_IDENTIFIER }}
        run: curl -sS --fail-with-body -X POST "$APPDB_API_BASE_URL/add_official_ipa/" -F "ipa=@Ichime.ipa" --form-string "st=$APPDB_ST" --form-string "brand=appdb" --form-string "lang=en" --form-string "job_id=${{ steps.appdb_job.outputs.id }}" --form-string "scope=$APPDB_APP_IDENTIFIER" -o appdb-add.json

      - name: Check appdb Upload Response
        run: jq -e '.success != false' appdb-add.json

      - name: Wait for appdb IPA Analysis
        id: appdb_analysis
        env:
          APPDB_ST: ${{ secrets.APPDB_ST }}
        run: >
          for attempt in {1..60}; do
          curl -sS --fail-with-body -X POST "$APPDB_API_BASE_URL/get_official_ipa_analyze_jobs/" --data-urlencode "st=$APPDB_ST" --data-urlencode "brand=appdb" --data-urlencode "lang=en" --data-urlencode "ids[]=${{ steps.appdb_job.outputs.id }}" -o appdb-analysis.json;
          status="$(jq -r '.data[] | select(.id == "${{ steps.appdb_job.outputs.id }}") | .status // empty' appdb-analysis.json)";
          finished="$(jq -r '.data[] | select(.id == "${{ steps.appdb_job.outputs.id }}") | .is_finished // 0' appdb-analysis.json)";
          issue="$(jq -r '.data[] | select(.id == "${{ steps.appdb_job.outputs.id }}") | .last_status_validation_issue // empty' appdb-analysis.json)";
          sha1="$(jq -r '.data[] | select(.id == "${{ steps.appdb_job.outputs.id }}") | .sha1_hash // empty' appdb-analysis.json)";
          echo "appdb analyze job ${{ steps.appdb_job.outputs.id }}: ${status:-unknown} ($attempt/60)";
          if [[ "$finished" == "1" && "$status" =~ ^(ok|success|validated|completed)$ ]]; then echo "sha1=$sha1" >> "$GITHUB_OUTPUT"; exit 0; fi;
          if [[ "$finished" == "1" ]]; then echo "::error::appdb analysis failed: ${issue:-$status}"; exit 1; fi;
          sleep 10;
          done;
          echo "::error::Timed out waiting for appdb analysis";
          exit 1

      - name: Find appdb IPA
        id: appdb_ipa
        env:
          APPDB_ST: ${{ secrets.APPDB_ST }}
          APPDB_APP_IDENTIFIER: ${{ vars.APPDB_APP_IDENTIFIER }}
        run: >
          for attempt in {1..60}; do
          curl -sS --fail-with-body -X POST "$APPDB_API_BASE_URL/get_official_ipas/" --data-urlencode "st=$APPDB_ST" --data-urlencode "brand=appdb" --data-urlencode "lang=en" --data-urlencode "scope=$APPDB_APP_IDENTIFIER" -o appdb-ipas.json;
          ipa="$(jq -r --arg version "$APP_VERSION" '[.data[] | select(.bundle_version == $version)] | sort_by((.updated_at // 0), (.id // 0)) | last // empty' appdb-ipas.json)";
          ipa_id="$(jq -r '.id // empty' <<< "$ipa")";
          status="$(jq -r '.status // empty' <<< "$ipa")";
          issue="$(jq -r '.last_status_validation_issue // empty' <<< "$ipa")";
          echo "appdb IPA ${ipa_id:-missing}: ${status:-unknown} ($attempt/60)";
          if [[ -n "$ipa_id" ]]; then echo "id=$ipa_id" >> "$GITHUB_OUTPUT"; echo "status=$status" >> "$GITHUB_OUTPUT"; exit 0; fi;
          if [[ "$status" =~ ^(validation_failed|duplicate|error)$ ]]; then echo "::error::appdb IPA failed: ${issue:-$status}"; exit 1; fi;
          sleep 10;
          done;
          echo "::error::Timed out waiting for appdb IPA";
          exit 1

      - name: Prepare Release Notes
        run: release_notes="$(jq -r '.release.body // ""' "$GITHUB_EVENT_PATH")"; if [ -n "$release_notes" ]; then printf '%s' "$release_notes" > release-notes.md; else printf 'Release %s' "$APP_VERSION" > release-notes.md; fi

      - name: Update appdb IPA Metadata
        env:
          APPDB_ST: ${{ secrets.APPDB_ST }}
        run: curl -sS --fail-with-body -X POST "$APPDB_API_BASE_URL/edit_official_ipa_metadata/" --form-string "id=${{ steps.appdb_ipa.outputs.id }}" --form-string "st=$APPDB_ST" --form-string "brand=appdb" --form-string "lang=en" --form-string "min_tvos_version=$APPDB_MIN_TVOS_VERSION" --form "description=<.github/assets/appdb_description.md" --form "whatsnew=<release-notes.md" -o appdb-metadata.json

      - name: Check appdb Metadata Response
        run: jq -e '.success != false' appdb-metadata.json

      - name: Wait for appdb IPA Approval
        env:
          APPDB_ST: ${{ secrets.APPDB_ST }}
          APPDB_APP_IDENTIFIER: ${{ vars.APPDB_APP_IDENTIFIER }}
        run: >
          for attempt in {1..60}; do
          curl -sS --fail-with-body -X POST "$APPDB_API_BASE_URL/get_official_ipas/" --data-urlencode "st=$APPDB_ST" --data-urlencode "brand=appdb" --data-urlencode "lang=en" --data-urlencode "scope=$APPDB_APP_IDENTIFIER" -o appdb-ipas.json;
          ipa="$(jq -r --arg id "${{ steps.appdb_ipa.outputs.id }}" '.data[] | select((.id | tostring) == $id) | . // empty' appdb-ipas.json)";
          status="$(jq -r '.status // empty' <<< "$ipa")";
          issue="$(jq -r '.last_status_validation_issue // empty' <<< "$ipa")";
          echo "appdb IPA ${{ steps.appdb_ipa.outputs.id }}: ${status:-unknown} ($attempt/60)";
          if [[ "$status" == "ok" ]]; then exit 0; fi;
          if [[ "$status" =~ ^(validation_failed|duplicate|error)$ ]]; then echo "::error::appdb IPA failed: ${issue:-$status}"; exit 1; fi;
          sleep 10;
          done;
          echo "::error::Timed out waiting for appdb IPA approval";
          exit 1

      - name: Assign IPA to appdb App
        env:
          APPDB_ST: ${{ secrets.APPDB_ST }}
          APPDB_APP_IDENTIFIER: ${{ vars.APPDB_APP_IDENTIFIER }}
        run: curl -sS --fail-with-body -X POST "$APPDB_API_BASE_URL/assign_ipa_to_app/" --data-urlencode "st=$APPDB_ST" --data-urlencode "brand=appdb" --data-urlencode "lang=en" --data-urlencode "to_app_identifier=$APPDB_APP_IDENTIFIER" --data-urlencode "ipa_id=${{ steps.appdb_ipa.outputs.id }}" -o appdb-assign.json

      - name: Check appdb Assignment Response
        run: jq -e '.success != false' appdb-assign.json

  upload_github_release:
    name: Upload IPA to GitHub Release
    runs-on: macos-26
    needs: [build_ipa]

    steps:
      - name: Download IPA Artifact
        uses: actions/download-artifact@v8
        with:
          name: ichime-ipa
          path: ./

      - name: Upload IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: Ichime.ipa
